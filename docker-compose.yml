services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  ingestor:
    build: ./services/ingestor
    volumes:
      - ./data/raw:/data/raw:ro
      - ./data/features:/data/features
    environment:
      - FEATURES_DIR=/data/features
      - RAW_DIR=/data/raw
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: on-failure   # batch job: retry on error, stop cleanly on success

  api:
    build: ./services/api
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw:/data/raw          # r/w — upload endpoint saves files here
      - ./data/features:/data/features
      - ./services/ingestor:/ingestor:ro  # shared code for in-process upload ingest
    environment:
      - FEATURES_DIR=/data/features
      - RAW_DIR=/data/raw
      - REDIS_URL=redis://redis:6379
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
      - VAULT_SECRET_PATH=secret/data/sleepwell
    depends_on:
      redis:
        condition: service_started
      ingestor:
        condition: service_started
      vault:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
